<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Control Panel - Ramadhan Warzone</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #f1c40f;
            --primary-glow: rgba(241, 196, 15, 0.3);
            --bg: #0f0f0f;
            --card: #1a1a1a;
            --card-hover: #222;
            --text: #ffffff;
            --text-dim: #a0a0a0;
            --accent: #2ecc71;
            --danger: #ff4757;
            --border: #333;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at 50% -20%, #222, #0f0f0f);
            color: var(--text);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            margin: 0;
            letter-spacing: 4px;
            color: var(--primary);
            font-size: 32px;
            font-weight: 800;
            text-transform: uppercase;
            text-shadow: 0 0 20px var(--primary-glow);
        }

        .credit {
            font-size: 13px;
            color: var(--text-dim);
            margin-top: 8px;
            letter-spacing: 1px;
        }

        .credit b { color: var(--primary); }

        /* Main Container */
        .container {
            width: 100%;
            max-width: 900px;
        }

        /* Event Logo Section */
        .event-upload {
            background: var(--card);
            padding: 25px;
            border-radius: 16px;
            border: 1px solid var(--border);
            text-align: center;
            margin-bottom: 30px;
            transition: 0.3s;
        }

        .event-upload:hover { border-color: var(--primary); }

        .preview-circle {
            width: 80px;
            height: 80px;
            background: #252525;
            margin: 0 auto 15px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px dashed #444;
            overflow: hidden;
        }

        .preview-circle img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Panel Grid */
        .panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 25px;
        }

        .group {
            background: var(--card);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }

        .group::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 4px; height: 100%;
            background: var(--primary);
        }

        h2 {
            margin: 0 0 25px;
            font-size: 18px;
            font-weight: 800;
            color: var(--primary);
        }

        .field { margin-bottom: 20px; }

        .field label {
            display: block;
            font-size: 11px;
            color: var(--text-dim);
            margin-bottom: 8px;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        input[type=text] {
            width: 100%;
            box-sizing: border-box;
            padding: 12px 15px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: #252525;
            color: white;
            font-size: 14px;
            transition: 0.2s;
        }

        input[type=text]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 10px var(--primary-glow);
        }

        .upload-box {
            background: #252525;
            border: 1px dashed #555;
            padding: 12px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .upload-box input { font-size: 12px; width: 100%; }

        /* Points Checkbox */
        .points-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .checkbox {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #252525;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid transparent;
            font-size: 13px;
            font-weight: 600;
        }

        .checkbox input { display: none; }

        .checkbox:has(input:checked) {
            background: rgba(46, 204, 113, 0.1);
            border-color: var(--accent);
            color: var(--accent);
        }

        /* Buttons */
        .actions {
            margin-top: 50px;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .reset {
            padding: 12px 40px;
            border-radius: 12px;
            background: transparent;
            border: 1px solid var(--danger);
            color: var(--danger);
            cursor: pointer;
            font-weight: 800;
            font-size: 13px;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .reset:hover {
            background: var(--danger);
            color: white;
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.3);
        }

        #status {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 20px;
            background: var(--accent);
            color: black;
            border-radius: 8px;
            font-weight: bold;
            display: none;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>

<header>
    <h1>Control Panel</h1>
    <div class="credit">EST. 2026 • DESIGNED BY <b>SETA</b></div>
</header>

<div class="container">
    <div class="event-upload">
        <div class="preview-circle" id="prev-logoEvent">
            <span style="font-size: 20px;"></span>
        </div>
        <div class="field">
            <label>Tournament Logo (Center)</label>
            <div class="upload-box">
                <input type="file" accept="image/*" onchange="uploadImage(event,'logoEvent')">
            </div>
        </div>
    </div>

    <div class="panel">
        <div class="group">
            <h2>TIM KIRI</h2>
            <div class="field">
                <label>Team Name</label>
                <input type="text" id="inLeft" placeholder="Masukkan nama tim..." oninput="save('teamLeft',this.value)">
            </div>

            <div class="field">
                <label>Team Logo</label>
                <div class="upload-box">
                    <input type="file" accept="image/*" onchange="uploadImage(event,'logoLeft')">
                </div>
            </div>

            <div class="field">
                <label>Match Points</label>
                <div class="points-container">
                    <label class="checkbox">
                        <input type="checkbox" id="cl2" onchange="save('l2',this.checked)"> Win 1
                    </label>
                    <label class="checkbox">
                        <input type="checkbox" id="cl1" onchange="save('l1',this.checked)"> Win 2
                    </label>
                </div>
            </div>
        </div>

        <div class="group">
            <h2>TIM KANAN</h2>
            <div class="field">
                <label>Team Name</label>
                <input type="text" id="inRight" placeholder="Masukkan nama tim..." oninput="save('teamRight',this.value)">
            </div>

            <div class="field">
                <label>Team Logo</label>
                <div class="upload-box">
                    <input type="file" accept="image/*" onchange="uploadImage(event,'logoRight')">
                </div>
            </div>

            <div class="field">
                <label>Match Points</label>
                <div class="points-container">
                    <label class="checkbox">
                        <input type="checkbox" id="cr1" onchange="save('r1',this.checked)"> Win 1
                    </label>
                    <label class="checkbox">
                        <input type="checkbox" id="cr2" onchange="save('r2',this.checked)"> Win 2
                    </label>
                </div>
            </div>
        </div>
    </div>

    <div class="actions">
        <button class="reset" onclick="resetAll()">Reset All Data</button>
    </div>
</div>

<div id="status">Data tersimpan!</div>

<script>
    function showStatus() {
        const s = document.getElementById('status');
        s.style.display = 'block';
        setTimeout(() => s.style.display = 'none', 1500);
    }

    function save(key, value){
        localStorage.setItem(key, value);
        if(typeof value === 'boolean') showStatus();
    }

    function uploadImage(event, key){
        const file = event.target.files[0];
        if(!file) return;

        const reader = new FileReader();
        reader.onload = function(e){
            localStorage.setItem(key, e.target.result);
            updatePreview(key, e.target.result);
            showStatus();
        }
        reader.readAsDataURL(file);
    }

    function updatePreview(key, src) {
        if(key === 'logoEvent') {
            document.getElementById('prev-logoEvent').innerHTML = `<img src="${src}">`;
        }
    }

    function resetAll(){
        if(confirm("Apakah Anda yakin ingin menghapus semua data overlay?")){
            localStorage.clear();
            location.reload();
        }
    }

    window.onload = () => {

        document.getElementById("inLeft").value = localStorage.getItem("teamLeft") || "";
        document.getElementById("inRight").value = localStorage.getItem("teamRight") || "";

        document.getElementById("cl1").checked = localStorage.getItem("l1") === "true";
        document.getElementById("cl2").checked = localStorage.getItem("l2") === "true";
        document.getElementById("cr1").checked = localStorage.getItem("r1") === "true";
        document.getElementById("cr2").checked = localStorage.getItem("r2") === "true";

        // Load Preview Logo
        const savedLogo = localStorage.getItem("logoEvent");
        if(savedLogo) updatePreview('logoEvent', savedLogo);
    }
</script>

</body>
</html>
